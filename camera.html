<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>撮影ブース</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  background: black;
}

/* カメラ */
#reader {
  width: 100vw;
  height: 100vh;
}

/* 枠（見た目用） */
#frame {
  position: fixed;
  width: 250px;
  height: 250px;
  border: 4px solid white;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* テキスト */
#text {
  position: fixed;
  top: 20%;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 24px;
}
</style>
</head>

<body>

<div id="text">QRコードをかざしてね</div>

<div id="reader"></div>
<div id="frame"></div>

<script>
const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: "environment" },
  {
    fps: 10,
    qrbox: 250
  },
  (decodedText) => {
    if(decodedText.includes("session")){
      html5QrCode.stop();
      startShoot();
    }
  }
);

// 撮影スタート（あとで中身増やす）
function startShoot(){
  alert("撮影スタート！");
}
</script>

</body>
</html>
