<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>撮影ブース</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* カメラ */
#reader {
  width: 100vw;
  height: 100vh;
}

/* 上テキスト */
#text {
  position: fixed;
  top: 40px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 24px;
  font-weight: bold;
  z-index: 10;
}

/* 枠（自作） */
#frame {
  position: fixed;
  width: 250px;
  height: 250px;
  border: 4px solid white;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 10;
}
</style>
</head>

<body>

<div id="text">ここにQRコードをかざしてね</div>

<div id="reader"></div>
<div id="frame"></div>

<script>
const html5QrCode = new Html5Qrcode("reader");

// 読み取り開始
html5QrCode.start(
  { facingMode: "environment" },
  {
    fps: 10,
    qrbox: { width: 250, height: 250 } // ←自分の枠と同じサイズ
  },
  (decodedText) => {
    console.log("読み取った:", decodedText);

    // テスト用：何でも反応する
    html5QrCode.stop();
    startShoot();
  }
);

// 撮影開始
function startShoot(){
  alert("撮影スタート！");
}
</script>

</body>
</html>
