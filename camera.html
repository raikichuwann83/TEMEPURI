<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>撮影ブース</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { margin:0; overflow:hidden; }

video {
 <script>
let video = document.getElementById("video");
let stream;
let isQRMode = false;

// カメラ起動
async function startCamera(mode = "user") {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: mode }
  });

  video.srcObject = stream;

  // 鏡ON/OFF
  if (mode === "user") {
    video.style.transform = "scaleX(-1)"; // 鏡
  } else {
    video.style.transform = "scaleX(1)"; // 通常
  }
}

// 初期は鏡（自撮り）
startCamera("user");

// QRモードにする
function startQR() {
  isQRMode = true;
  startCamera("environment"); // 背面カメラ（鏡なし）
}

// 通常に戻る
function backToNormal() {
  isQRMode = false;
  startCamera("user"); // インカメ（鏡）
}
</script>
}

#reader {
  position: fixed;
  width: 300px;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
}
</style>
</head>

<body>

<video id="video" autoplay></video>
<div id="reader"></div>

<script>
const video = document.getElementById("video");

// カメラ起動
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

// QR読み取り
function onScanSuccess(decodedText) {
  if(decodedText === "START_CAMERA"){
    startShoot();
  }
}

const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
  { facingMode: "user" },
  {
    fps: 10,
    qrbox: 250
  },
  onScanSuccess
);

// 撮影開始（シンプル版）
function startShoot(){
  alert("撮影スタート！");
}
</script>

</body>
</html>
