<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>撮影ブース</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

/* カメラ映像 */
video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

/* QR枠 */
#reader {
  position: fixed;
  width: 250px;
  height: 250px;
  border: 4px solid white;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
}

/* ボタン */
button {
  position: fixed;
  bottom: 20px;
  padding: 10px 20px;
  font-size: 16px;
}

#qrBtn { left: 20px; }
#backBtn { right: 20px; display: none; }

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>

<div id="reader"></div>

<button id="qrBtn" onclick="startQR()">QR</button>
<button id="backBtn" onclick="backToNormal()">戻る</button>

<script>
let video = document.getElementById("video");
let stream;
let html5QrCode;

// カメラ起動
async function startCamera(mode = "user") {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: mode }
  });

  video.srcObject = stream;

  // 鏡ON/OFF
  if (mode === "user") {
    video.style.transform = "scaleX(-1)";
  } else {
    video.style.transform = "scaleX(1)";
  }
}

// 初期：インカメ（鏡）
startCamera("user");

// QR読み取り開始
function startQR() {
  document.getElementById("reader").style.display = "block";
  document.getElementById("qrBtn").style.display = "none";
  document.getElementById("backBtn").style.display = "block";

  startCamera("environment");

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 200 },
    (decodedText) => {
      if(decodedText === "START_CAMERA"){
        startShoot();
      }
    }
  );
}

// 通常に戻る
function backToNormal() {
  document.getElementById("reader").style.display = "none";
  document.getElementById("qrBtn").style.display = "block";
  document.getElementById("backBtn").style.display = "none";

  if (html5QrCode) {
    html5QrCode.stop();
  }

  startCamera("user");
}

// 撮影スタート
function startShoot(){
  alert("撮影スタート！");
}
</script>

</body>
</html>
